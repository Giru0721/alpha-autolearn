services:
  - type: web
    name: prophit-ai
    runtime: docker
    plan: free
    envVars:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /data
      - key: DEFAULT_LANGUAGE
        value: en
    disk:
      name: prophit-data
      mountPath: /data
      sizeGB: 1
